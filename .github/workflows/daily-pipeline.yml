name: Daily Article Generation Pipeline

on:
  schedule:
    # 毎日 06:00 JST (= 21:00 UTC 前日) に実行
    - cron: '0 21 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'ドライランモード（実際の記事生成・公開を行わない）'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  generate-articles:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # Claude API
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      # microCMS
      MICROCMS_SERVICE_DOMAIN: ${{ secrets.MICROCMS_SERVICE_DOMAIN }}
      MICROCMS_API_KEY: ${{ secrets.MICROCMS_API_KEY }}
      # Supabase
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      # GA4 / GSC / BigQuery
      GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
      GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}
      GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
      GOOGLE_PROJECT_ID: ${{ secrets.GOOGLE_PROJECT_ID }}
      GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
      BQ_DATASET_ID: ${{ secrets.BQ_DATASET_ID }}
      # Slack通知
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      # ドライランフラグ
      DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run daily pipeline
        run: npx tsx scripts/run-pipeline.ts daily ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}

      - name: Notify on failure
        if: failure()
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -s -X POST "$SLACK_WEBHOOK_URL" \
              -H 'Content-Type: application/json' \
              -d "{\"text\":\"❌ 日次パイプラインが失敗しました\\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
          fi
