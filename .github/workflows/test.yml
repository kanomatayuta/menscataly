# Lightweight test gate — full CI (lint, typecheck, coverage, build, E2E) is in ci.yml.
# This workflow exists so branch-protection rules referencing "Test / test" keep working.
# It runs only unit tests (no lint/typecheck/build, which ci.yml already covers).
name: Test
on:
  push:
    branches-ignore: [main, 'feature/**']
  pull_request:
    branches-ignore: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx vitest run
